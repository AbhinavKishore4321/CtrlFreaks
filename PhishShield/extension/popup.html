<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #06080d;
    --surface:   #0b1017;
    --border:    #1c2a36;
    --accent:    #00e5ff;
    --accent2:   #7b5cff;
    --safe:      #00ff9d;
    --warn:      #ffcc00;
    --danger:    #ff3a5c;
    --muted:     #3a5568;
    --text:      #ccd9e3;
    --text-dim:  #5a7a8e;
    --mono:      'JetBrains Mono', monospace;
    --display:   'Syne', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 360px;
    min-height: 480px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Noise texture overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
    opacity: .6;
  }

  /* ── Animated corner bracket ── */
  .bracket { position: absolute; width:16px; height:16px; }
  .bracket::before, .bracket::after { content:''; position:absolute; background: var(--accent); }
  .bracket.tl { top:10px; left:10px; }
  .bracket.tl::before { width:2px; height:100%; top:0; left:0; }
  .bracket.tl::after  { width:100%; height:2px; top:0; left:0; }
  .bracket.tr { top:10px; right:10px; }
  .bracket.tr::before { width:2px; height:100%; top:0; right:0; }
  .bracket.tr::after  { width:100%; height:2px; top:0; right:0; }
  .bracket.bl { bottom:10px; left:10px; }
  .bracket.bl::before { width:2px; height:100%; bottom:0; left:0; }
  .bracket.bl::after  { width:100%; height:2px; bottom:0; left:0; }
  .bracket.br { bottom:10px; right:10px; }
  .bracket.br::before { width:2px; height:100%; bottom:0; right:0; }
  .bracket.br::after  { width:100%; height:2px; bottom:0; right:0; }

  /* ── HEADER ── */
  .header {
    position: relative; z-index:1;
    padding: 18px 20px 14px;
    background: linear-gradient(160deg, #0d1b28 0%, #0b1017 100%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
  }

  .shield-wrap {
    position: relative;
    width: 42px; height: 42px;
    flex-shrink: 0;
  }
  .shield-svg { width:100%; height:100%; }
  .shield-pulse {
    position: absolute; inset: -5px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    animation: pulse-ring 2.4s ease-out infinite;
    opacity: 0;
  }
  @keyframes pulse-ring {
    0%   { transform:scale(.7); opacity:.6; }
    100% { transform:scale(1.6); opacity:0; }
  }

  .header-text {}
  .header-title {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
    line-height: 1;
  }
  .header-title em { color: var(--accent); font-style: normal; }
  .header-sub {
    color: var(--text-dim);
    font-size: 10px;
    margin-top: 3px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .status-dot {
    margin-left: auto;
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: var(--text-dim);
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--safe);
    box-shadow: 0 0 6px var(--safe);
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── BODY ── */
  .body { position:relative; z-index:1; padding: 16px; }

  /* URL display */
  .url-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .url-icon { color: var(--accent); font-size: 13px; flex-shrink:0; }
  .url-text {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    word-break: break-all;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* Scan button */
  .scan-btn {
    width: 100%;
    position: relative;
    overflow: hidden;
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    padding: 11px;
    border-radius: 6px;
    font-family: var(--display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    margin-bottom: 14px;
    transition: color .2s, background .2s;
  }
  .scan-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform .35s cubic-bezier(.4,0,.2,1);
    z-index: 0;
  }
  .scan-btn:hover::before { transform: translateX(0); }
  .scan-btn:hover { color: #000; }
  .scan-btn span { position:relative; z-index:1; }
  .scan-btn:disabled { opacity:.4; cursor:not-allowed; }

  /* ── LOADING ── */
  #loading {
    display: none;
    align-items: center; gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { color: var(--text-dim); font-size: 11px; }
  .loading-text span {
    display: inline-block;
    animation: ellipsis 1.2s steps(3, end) infinite;
    width: 12px;
  }
  @keyframes ellipsis {
    0%{content:'.'} 33%{content:'..'} 66%{content:'...'} 100%{content:''}
  }

  /* ── RESULT ── */
  #result { display:none; animation: fadeUp .3s ease; }
  #result.active { display:block; }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* Verdict card */
  .verdict-card {
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .verdict-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .verdict-card.safe    { background: rgba(0,255,157,.06); border: 1px solid rgba(0,255,157,.2); }
  .verdict-card.safe::before { background: var(--safe); box-shadow: 0 0 12px var(--safe); }
  .verdict-card.suspicious { background: rgba(255,204,0,.06); border: 1px solid rgba(255,204,0,.2); }
  .verdict-card.suspicious::before { background: var(--warn); box-shadow: 0 0 12px var(--warn); }
  .verdict-card.phishing { background: rgba(255,58,92,.07); border: 1px solid rgba(255,58,92,.3); }
  .verdict-card.phishing::before { background: var(--danger); box-shadow: 0 0 12px var(--danger); }

  .verdict-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .verdict-label {
    font-family: var(--display);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .5px;
  }
  .safe    .verdict-label { color: var(--safe); }
  .suspicious .verdict-label { color: var(--warn); }
  .phishing .verdict-label { color: var(--danger); }

  .score-pill {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .safe    .score-pill { background: rgba(0,255,157,.12); color: var(--safe); border: 1px solid rgba(0,255,157,.3); }
  .suspicious .score-pill { background: rgba(255,204,0,.12); color: var(--warn); border: 1px solid rgba(255,204,0,.3); }
  .phishing .score-pill { background: rgba(255,58,92,.12); color: var(--danger); border: 1px solid rgba(255,58,92,.3); }

  /* Risk bar */
  .risk-track {
    height: 5px;
    background: rgba(255,255,255,.06);
    border-radius: 3px;
    overflow: hidden;
  }
  .risk-fill {
    height: 100%;
    width: 0;
    border-radius: 3px;
    transition: width .9s cubic-bezier(.4,0,.2,1);
  }
  .safe    .risk-fill { background: linear-gradient(90deg, var(--safe), #00c97d); }
  .suspicious .risk-fill { background: linear-gradient(90deg, #ffaa00, var(--warn)); }
  .phishing .risk-fill { background: linear-gradient(90deg, #c0002a, var(--danger)); box-shadow: 0 0 10px rgba(255,58,92,.4); }

  /* Signals */
  .signals-header {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 7px;
  }
  .signals-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    max-height: 160px;
    overflow-y: auto;
    margin-bottom: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .signal-item {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 7px 12px;
    border-bottom: 1px solid rgba(255,255,255,.03);
    transition: background .15s;
  }
  .signal-item:last-child { border-bottom: none; }
  .signal-item:hover { background: rgba(255,255,255,.03); }
  .sdot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 3px;
  }
  .sdot.critical, .sdot.danger { background: var(--danger); box-shadow: 0 0 5px var(--danger); }
  .sdot.warning { background: var(--warn); box-shadow: 0 0 5px var(--warn); }
  .sdot.info    { background: var(--accent2); }
  .sdot.safe    { background: var(--safe); }
  .signal-msg   { font-size: 11px; color: var(--text); line-height: 1.5; }

  /* Footer button */
  .open-full {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 9px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .5px;
    transition: border-color .2s, color .2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .open-full:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Error state */
  .error-box {
    background: rgba(255,58,92,.07);
    border: 1px solid rgba(255,58,92,.25);
    border-radius: 6px;
    padding: 12px;
    font-size: 11px;
    color: var(--danger);
    display: flex; align-items: center; gap: 8px;
  }
  .error-icon { font-size: 16px; flex-shrink:0; }
</style>
</head>
<body>
  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>

  <div class="header">
    <div class="shield-wrap">
      <div class="shield-pulse"></div>
      <svg class="shield-svg" viewBox="0 0 40 46" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 2L4 9V22C4 31.5 11 40.2 20 43C29 40.2 36 31.5 36 22V9L20 2Z"
              fill="rgba(0,229,255,.12)" stroke="#00e5ff" stroke-width="1.5"/>
        <path d="M14 22L18 26L27 17" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="header-text">
      <div class="header-title">Phish<em>Shield</em></div>
      <div class="header-sub">Threat Detection</div>
    </div>
    <div class="status-dot">
      <div class="dot"></div>
      <span>LIVE</span>
    </div>
  </div>

  <div class="body">
    <div class="url-box">
      <div class="url-icon">⬡</div>
      <div id="currentUrl" class="url-text">Loading current tab...</div>
    </div>

    <button class="scan-btn" id="scanBtn">
      <span>⚡ SCAN THIS PAGE</span>
    </button>

    <div id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Analyzing threat vectors<span>...</span></div>
    </div>

    <div id="result">
      <div id="verdictCard" class="verdict-card">
        <div class="verdict-top">
          <div id="verdictText" class="verdict-label"></div>
          <div id="scoreBadge" class="score-pill"></div>
        </div>
        <div class="risk-track">
          <div id="riskFill" class="risk-fill"></div>
        </div>
      </div>

      <div class="signals-header">// Signal Analysis</div>
      <div id="signalsList" class="signals-list"></div>

      <button class="open-full" id="openFullBtn">
        <span>↗</span> Open in PhishShield Console
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
