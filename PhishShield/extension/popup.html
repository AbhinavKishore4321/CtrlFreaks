<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 320px;
    background: #050a0e;
    color: #c8dde8;
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px;
  }

  .header {
    background: linear-gradient(135deg, #0a1a28, #0f2030);
    padding: 16px 18px;
    border-bottom: 1px solid #1a3040;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-icon { font-size: 22px; }
  .header-title { font-size: 16px; font-weight: 700; color: #fff; }
  .header-title span { color: #00d4ff; }

  .body { padding: 16px; }

  .current-url {
    background: #0a1218;
    border: 1px solid #1a3040;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 12px;
    font-family: monospace;
    font-size: 11px;
    color: #4a7a94;
    word-break: break-all;
    max-height: 50px;
    overflow: hidden;
  }

  .scan-btn {
    width: 100%;
    background: linear-gradient(135deg, #00d4ff, #0088ff);
    color: #000;
    border: none;
    padding: 11px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .scan-btn:disabled { opacity: 0.5; }

  .result { display: none; }
  .result.active { display: block; }

  .verdict-card {
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .verdict-card.safe { background: rgba(0,255,136,0.07); border: 1px solid rgba(0,255,136,0.25); }
  .verdict-card.suspicious { background: rgba(255,184,0,0.07); border: 1px solid rgba(255,184,0,0.25); }
  .verdict-card.phishing { background: rgba(255,58,92,0.07); border: 1px solid rgba(255,58,92,0.3); }

  .verdict-row { display: flex; align-items: center; justify-content: space-between; }
  .verdict-text { font-size: 14px; font-weight: 700; }
  .safe .verdict-text { color: #00ff88; }
  .suspicious .verdict-text { color: #ffb800; }
  .phishing .verdict-text { color: #ff3a5c; }

  .score-badge {
    font-family: monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
  }
  .safe .score-badge { background: rgba(0,255,136,0.15); color: #00ff88; }
  .suspicious .score-badge { background: rgba(255,184,0,0.15); color: #ffb800; }
  .phishing .score-badge { background: rgba(255,58,92,0.15); color: #ff3a5c; }

  .risk-bar { height: 4px; background: #1a3040; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .risk-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s; width: 0; }
  .safe .risk-bar-fill { background: #00ff88; }
  .suspicious .risk-bar-fill { background: #ffb800; }
  .phishing .risk-bar-fill { background: #ff3a5c; }

  .signals {
    background: #0a1218;
    border: 1px solid #1a3040;
    border-radius: 8px;
    padding: 10px 12px;
    max-height: 150px;
    overflow-y: auto;
  }

  .signal-item {
    display: flex;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 11px;
    line-height: 1.4;
  }
  .signal-item:last-child { border: none; }

  .sdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .sdot.critical { background: #ff3a5c; }
  .sdot.danger { background: #ff7a30; }
  .sdot.warning { background: #ffb800; }
  .sdot.info { background: #00d4ff; }
  .sdot.safe { background: #00ff88; }

  .loading { text-align: center; padding: 20px; color: #4a7a94; font-size: 12px; }

  .open-full {
    width: 100%;
    margin-top: 10px;
    background: transparent;
    border: 1px solid #1a3040;
    color: #4a7a94;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .open-full:hover { border-color: #00d4ff; color: #00d4ff; }
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">🛡️</div>
  <div class="header-title">Phish<span>Shield</span></div>
</div>
<div class="body">
  <div class="current-url" id="currentUrl">Loading current tab...</div>
  <button class="scan-btn" id="scanBtn">⚡ Scan This Page</button>

  <div class="loading" id="loading" style="display:none">Scanning...</div>

  <div class="result" id="result">
    <div class="verdict-card" id="verdictCard">
      <div class="verdict-row">
        <div class="verdict-text" id="verdictText"></div>
        <div class="score-badge" id="scoreBadge"></div>
      </div>
      <div class="risk-bar"><div class="risk-bar-fill" id="riskFill"></div></div>
    </div>
    <div class="signals" id="signalsList"></div>
    <button class="open-full" onclick="openFullApp()">Open in PhishShield →</button>
  </div>
</div>

<script>
let currentUrl = '';

chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
  currentUrl = tabs[0]?.url || '';
  document.getElementById('currentUrl').textContent = currentUrl || 'No URL';
});

document.getElementById('scanBtn').addEventListener('click', async () => {
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').classList.remove('active');

  try {
    const resp = await fetch('http://localhost:5000/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: currentUrl })
    });
    const data = await resp.json();
    renderResult(data);
  } catch {
    document.getElementById('signalsList').innerHTML = '<div style="color:#ff3a5c;font-size:11px">Cannot connect to PhishShield API. Make sure it\'s running on port 5000.</div>';
    document.getElementById('result').classList.add('active');
  }

  document.getElementById('loading').style.display = 'none';
  btn.disabled = false;
});

function renderResult(data) {
  const v = data.verdict.toLowerCase();
  const card = document.getElementById('verdictCard');
  card.className = 'verdict-card ' + v;

  const labels = { phishing: '🚨 PHISHING DETECTED', suspicious: '⚠️ SUSPICIOUS', safe: '✅ SAFE' };
  document.getElementById('verdictText').textContent = labels[v];
  document.getElementById('scoreBadge').textContent = data.risk_score + '/100';

  setTimeout(() => {
    document.getElementById('riskFill').style.width = data.risk_score + '%';
  }, 100);

  const list = document.getElementById('signalsList');
  list.innerHTML = '';
  const order = { critical: 0, danger: 1, warning: 2, info: 3, safe: 4 };
  const sorted = (data.signals || []).sort((a, b) => (order[a.type] ?? 5) - (order[b.type] ?? 5));

  sorted.slice(0, 8).forEach(sig => {
    const item = document.createElement('div');
    item.className = 'signal-item';
    item.innerHTML = `<div class="sdot ${sig.type}"></div><div>${sig.msg}</div>`;
    list.appendChild(item);
  });

  document.getElementById('result').classList.add('active');
}

function openFullApp() {
  chrome.tabs.create({ url: chrome.runtime.getURL('../../frontend/index.html') });
}
</script>
</body>
</html>
