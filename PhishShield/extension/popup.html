<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 320px;
    background: #050a0e;
    color: #c8dde8;
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px;
  }

  .header {
    background: linear-gradient(135deg, #0a1a28, #0f2030);
    padding: 16px 18px;
    border-bottom: 1px solid #1a3040;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-icon { font-size: 22px; }
  .header-title { font-size: 16px; font-weight: 700; color: #fff; }
  .header-title span { color: #00d4ff; }

  .body { padding: 16px; }

  .current-url {
    background: #0a1218;
    border: 1px solid #1a3040;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 12px;
    font-family: monospace;
    font-size: 11px;
    color: #4a7a94;
    word-break: break-all;
    max-height: 50px;
    overflow: hidden;
  }

  .scan-btn {
    width: 100%;
    background: linear-gradient(135deg, #00d4ff, #0088ff);
    color: #000;
    border: none;
    padding: 11px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 12px;
  }

  .scan-btn:disabled { opacity: 0.5; }

  .result { display: none; }
  .result.active { display: block; }

  .verdict-card {
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }

  .verdict-card.safe { background: rgba(0,255,136,0.07); border: 1px solid rgba(0,255,136,0.25); }
  .verdict-card.suspicious { background: rgba(255,184,0,0.07); border: 1px solid rgba(255,184,0,0.25); }
  .verdict-card.phishing { background: rgba(255,58,92,0.07); border: 1px solid rgba(255,58,92,0.3); }

  .verdict-row {
    display: flex;
    justify-content: space-between;
  }

  .verdict-text { font-weight: 700; }

  .score-badge {
    font-family: monospace;
    font-weight: 700;
  }

  .risk-bar {
    height: 4px;
    background: #1a3040;
    margin-top: 8px;
  }

  .risk-bar-fill {
    height: 100%;
    width: 0;
    transition: width 0.8s;
  }

  .signals {
    background: #0a1218;
    border: 1px solid #1a3040;
    border-radius: 8px;
    padding: 10px;
    max-height: 150px;
    overflow-y: auto;
  }

  .signal-item {
    display: flex;
    gap: 8px;
    font-size: 11px;
    padding: 4px 0;
  }

  .sdot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 3px;
  }

  .open-full {
    width: 100%;
    margin-top: 10px;
    background: transparent;
    border: 1px solid #1a3040;
    color: #4a7a94;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="header">
  <div class="header-icon">🛡️</div>
  <div class="header-title">Phish<span>Shield</span></div>
</div>

<div class="body">

  <div id="currentUrl">Loading...</div>

  <button id="scanBtn">⚡ Scan This Page</button>

  <div id="loading" style="display:none">Scanning...</div>

  <div id="result">

    <div id="verdictCard">
      <div>
        <div id="verdictText"></div>
        <div id="scoreBadge"></div>
      </div>
      <div>
        <div id="riskFill"></div>
      </div>
    </div>

    <div id="signalsList"></div>

    <!-- ✅ FIXED BUTTON (NO onclick) -->
    <button class="open-full">Open in PhishShield →</button>

  </div>

</div>

<!-- ✅ CORRECT WAY -->
<script src="popup.js"></script>

</body>
</html>
